<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>管理者ログイン</title>
  <link rel="stylesheet" href="css/style.css" />
  <script defer src="js/admin.js"></script>
</head>
<body>
  <div class="container" style="max-width:520px;margin:40px auto;">
    <div class="card">
      <h2 style="margin-top:0;">管理者ログイン</h2>

      <form id="adminForm">
        <label>メールアドレス</label>
        <input class="input" id="adminEmail" type="email" required />

        <div style="height:10px;"></div>

        <label>パスワード</label>
        <input class="input" id="adminPassword" type="password" required />

        <div style="height:14px;"></div>

        <button class="btn" type="submit" style="width:100%;">ログイン</button>
      </form>

      <div class="small" id="adminMsg" style="margin-top:12px;"></div>
    </div>
  </div>
</body>
</html>
